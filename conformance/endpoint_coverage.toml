# ─── Mapping: module re-exports ────────────────────────────────────────
# Module declarations (pub mod foo) are structural and do not need
# behavior tests — their contract is the set of items they export, each
# of which has its own mapping.
[exempt.module_declarations]
description = "pub mod foo — structural exports covered by item-level mappings"
symbols = [
    "bridge",
    "enforcement",
    "enums",
    "kernel",
    "pipeline",
    "user",
    "calibrations",
    "combinators",
    "prelude",
    "replay",
    "resolver",
    "__test_helpers",
    "transcendentals",
    "constrained_type_shape_sealed",
]

# Snapshot-scanner artifacts: `pub const fn foo(...)` when matched against
# the `const ` prefix first extracts kind="const" name="fn". These
# artifact entries are excluded from coverage — the real function names
# underneath are covered elsewhere.
[exempt.snapshot_scanner_artifacts]
description = "Anomalous snapshot entries from the scanner's parse of `pub const fn`"
symbols = ["fn"]
